<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fcfcfb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a19" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mist">
<title>Mist Controller</title>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --muted:          #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --accent:         #2a78d6;
    --accent-wash:    #cde2fb;
    --good:           #0ca30c;
    --warning:        #fab219;
    --serious:        #ec835a;
    --critical:       #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page-plane:     #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --muted:          #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --accent:         #3987e5;
      --accent-wash:    #184f95;
      --good:           #0ca30c;
      --warning:        #fab219;
      --serious:        #ec835a;
      --critical:       #d03b3b;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--page-plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
  }

  .app { max-width: 480px; margin: 0 auto; }

  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  header.top h1 { font-size: 20px; font-weight: 600; margin: 0; }
  header.top .status {
    font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.on { background: var(--good); }
  .dot.off { background: var(--critical); }

  .device-status {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    font-size: 14px; font-weight: 600;
  }
  .device-status .dot { width: 10px; height: 10px; }
  .device-status.online { color: var(--good); }
  .device-status.offline { color: var(--critical); }
  .device-status.unknown { color: var(--text-secondary); }

  /* --- Login --- */
  #login {
    display: flex; flex-direction: column; gap: 14px;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-top: 40px;
  }
  #login h2 { margin: 0 0 4px; font-size: 17px; }
  #login p { margin: 0 0 8px; font-size: 13px; color: var(--text-secondary); }
  #login label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  #login input {
    width: 100%; font-size: 16px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--page-plane); color: var(--text-primary);
  }
  .pass-row { display: flex; gap: 8px; }
  .pass-row input { flex: 1; min-width: 0; }
  .pass-row button {
    flex: none; font-size: 13px; padding: 0 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--page-plane); color: var(--text-secondary);
    cursor: pointer;
  }
  #login button {
    margin-top: 6px; font-size: 15px; font-weight: 600; padding: 12px;
    border: none; border-radius: 8px; background: var(--accent); color: #fff;
    cursor: pointer;
  }
  #login button:active { opacity: 0.85; }
  #loginError { color: var(--critical); font-size: 13px; min-height: 16px; }

  /* --- KPI row --- */
  #dashboard { display: none; flex-direction: column; gap: 12px; }
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .metric-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .minmax { display: flex; flex-direction: column; gap: 4px; text-align: right; }
  .minmax-item { display: flex; gap: 6px; justify-content: flex-end; font-size: 12px; }
  .minmax-label { color: var(--text-secondary); }
  .minmax-value { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
  .spark-label { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .tile {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .tile.wide { grid-column: 1 / -1; }
  .tile .label { font-size: 13px; color: var(--text-secondary); }
  .tile .value-row { display: flex; align-items: baseline; gap: 4px; }
  .tile .value { font-size: 34px; font-weight: 600; line-height: 1.1; font-variant-numeric: proportional-nums; }
  .tile .unit { font-size: 15px; color: var(--text-secondary); }
  .tile .badge {
    align-self: flex-start; font-size: 12px; font-weight: 600;
    padding: 3px 8px; border-radius: 999px; margin-top: 2px;
    display: flex; align-items: center; gap: 4px;
  }
  .badge.good { color: var(--good); background: color-mix(in srgb, var(--good) 14%, transparent); }
  .badge.warning { color: #9c6a00; background: color-mix(in srgb, var(--warning) 22%, transparent); }
  .badge.serious { color: var(--serious); background: color-mix(in srgb, var(--serious) 16%, transparent); }
  .badge.critical { color: var(--critical); background: color-mix(in srgb, var(--critical) 14%, transparent); }
  @media (prefers-color-scheme: dark) {
    .badge.warning { color: var(--warning); }
  }

  .spark-wrap { position: relative; margin-top: 4px; touch-action: pan-y; }
  .spark { width: 100%; height: 32px; display: block; cursor: crosshair; }
  .spark polyline { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .spark-crosshair { stroke: var(--muted); stroke-width: 1; vector-effect: non-scaling-stroke; }
  .spark-dot { fill: var(--accent); stroke: var(--surface-1); stroke-width: 1.5; vector-effect: non-scaling-stroke; }
  .spark-tooltip {
    position: absolute; top: -4px; right: 0;
    font-size: 11px; padding: 2px 6px; border-radius: 6px;
    background: var(--surface-1); border: 1px solid var(--border);
    pointer-events: none; opacity: 0; transition: opacity 0.1s; white-space: nowrap;
  }
  .spark-tooltip.visible { opacity: 1; }
  .spark-tooltip .val { color: var(--text-primary); font-weight: 600; }
  .spark-tooltip .lbl { color: var(--text-secondary); margin-left: 4px; }

  .updated { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }

  /* --- Керування --- */
  .control-tile { gap: 12px; }
  .control-tile .row-title { display: flex; align-items: center; justify-content: space-between; }
  .control-tile h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .state-line { font-size: 13px; color: var(--text-secondary); }
  .state-line b { color: var(--text-primary); }

  .segmented { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .segmented button {
    flex: 1; padding: 8px 0; font-size: 13px; font-weight: 600;
    border: none; background: var(--page-plane); color: var(--text-secondary); cursor: pointer;
  }
  .segmented button:not(:last-child) { border-right: 1px solid var(--border); }
  .segmented button.active { background: var(--accent); color: #fff; }

  .target-row { display: flex; gap: 8px; align-items: center; }
  .target-input-wrap {
    flex: 1; display: flex; align-items: center; min-width: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--page-plane); padding-right: 10px;
  }
  .target-input-wrap input {
    flex: 1; min-width: 0; border: none; background: transparent;
    font-size: 16px; padding: 8px 0 8px 10px; color: var(--text-primary);
  }
  .target-input-wrap input:focus { outline: none; }
  .target-input-wrap input::-webkit-outer-spin-button,
  .target-input-wrap input::-webkit-inner-spin-button { margin-left: 4px; }
  .target-suffix { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .target-row button, .schedule-save {
    font-size: 13px; font-weight: 600; padding: 8px 14px;
    border: none; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer;
  }

  .schedule-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
  .schedule-row input[type="time"], .schedule-row select {
    font-size: 14px; padding: 7px 8px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--page-plane); color: var(--text-primary);
  }
  #scheduleRows { display: flex; flex-direction: column; gap: 8px; }

  #logout {
    margin-top: 4px; font-size: 13px; color: var(--text-secondary);
    background: none; border: none; text-decoration: underline;
    padding: 8px; cursor: pointer; align-self: center;
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>Mist Controller</h1>
    <div class="status"><span class="dot" id="connDot"></span><span id="connText">офлайн</span></div>
  </header>

  <div id="login">
    <h2>Вхід</h2>
    <p>Дані від MQTT-брокера (HiveMQ Cloud). Зберігаються лише в цьому браузері.</p>
    <div>
      <label for="user">Користувач</label>
      <input id="user" type="text" autocomplete="username" autocapitalize="off" autocorrect="off">
    </div>
    <div>
      <label for="pass">Пароль</label>
      <div class="pass-row">
        <input id="pass" type="password" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button type="button" id="togglePass">Показати</button>
      </div>
    </div>
    <div id="loginError"></div>
    <button id="loginBtn">Підключитись</button>
  </div>

  <div id="dashboard">
    <div class="device-status" id="deviceStatus">
      <span class="dot" id="deviceDot"></span>
      <span id="deviceStatusText">Контролер: —</span>
    </div>
    <div class="kpi-row">
      <div class="tile wide">
        <div class="metric-head">
          <div>
            <div class="label">Температура</div>
            <div class="value-row"><span class="value" id="tempValue">—</span><span class="unit">°C</span></div>
          </div>
          <div class="minmax">
            <div class="minmax-item"><span class="minmax-label">Highest 24h</span><span class="minmax-value" id="tempHigh">—</span></div>
            <div class="minmax-item"><span class="minmax-label">Lowest 24h</span><span class="minmax-value" id="tempLow">—</span></div>
          </div>
        </div>
        <div class="spark-label">Last 60min</div>
        <div class="spark-wrap" id="tempSparkWrap">
          <svg class="spark" viewBox="0 0 100 32" preserveAspectRatio="none">
            <line class="spark-crosshair" id="tempCrosshair" x1="0" y1="0" x2="0" y2="32" opacity="0"></line>
            <polyline id="tempSpark" points=""></polyline>
            <circle class="spark-dot" id="tempDot" r="2.5" opacity="0"></circle>
          </svg>
          <div class="spark-tooltip" id="tempTooltip"></div>
        </div>
      </div>
      <div class="tile wide">
        <div class="metric-head">
          <div>
            <div class="label">Вологість</div>
            <div class="value-row"><span class="value" id="humValue">—</span><span class="unit">%</span></div>
          </div>
          <div class="minmax">
            <div class="minmax-item"><span class="minmax-label">Highest 24h</span><span class="minmax-value" id="humHigh">—</span></div>
            <div class="minmax-item"><span class="minmax-label">Lowest 24h</span><span class="minmax-value" id="humLow">—</span></div>
          </div>
        </div>
        <div class="spark-label">Last 60min</div>
        <div class="spark-wrap" id="humSparkWrap">
          <svg class="spark" viewBox="0 0 100 32" preserveAspectRatio="none">
            <line class="spark-crosshair" id="humCrosshair" x1="0" y1="0" x2="0" y2="32" opacity="0"></line>
            <polyline id="humSpark" points=""></polyline>
            <circle class="spark-dot" id="humDot" r="2.5" opacity="0"></circle>
          </svg>
          <div class="spark-tooltip" id="humTooltip"></div>
        </div>
      </div>
      <div class="tile wide">
        <div class="label">Сигнал WiFi (RSSI)</div>
        <div class="value-row"><span class="value" id="rssiValue">—</span><span class="unit">dBm</span></div>
        <div class="badge" id="rssiBadge"></div>
      </div>
    </div>
    <div class="tile control-tile">
      <div class="row-title"><h3>Пароутворювач</h3><span class="state-line">зараз: <b id="mistStateText">—</b></span></div>
      <div class="segmented" id="mistModeButtons">
        <button data-mode="auto">Авто</button>
        <button data-mode="on">Увімк</button>
        <button data-mode="off">Вимк</button>
      </div>
      <div class="target-row">
        <div class="target-input-wrap">
          <input id="targetHumidityInput" type="number" min="0" max="100" step="0.5" placeholder="Ціль">
          <span class="target-suffix">% вологості</span>
        </div>
        <button id="targetHumiditySave">Зберегти</button>
      </div>
    </div>

    <div class="tile control-tile">
      <div class="row-title"><h3>Світло</h3><span class="state-line">зараз: <b id="ledStateText">—</b></span></div>
      <div class="segmented" id="ledModeButtons">
        <button data-mode="auto">Авто</button>
        <button data-mode="on">Увімк</button>
        <button data-mode="off">Вимк</button>
      </div>
      <div id="scheduleRows">
        <div class="schedule-row">
          <input type="time" id="sched0Start"><input type="time" id="sched0End">
          <select id="sched0State"><option value="on">Увімк</option><option value="off">Вимк</option></select>
        </div>
        <div class="schedule-row">
          <input type="time" id="sched1Start"><input type="time" id="sched1End">
          <select id="sched1State"><option value="on">Увімк</option><option value="off">Вимк</option></select>
        </div>
        <div class="schedule-row">
          <input type="time" id="sched2Start"><input type="time" id="sched2End">
          <select id="sched2State"><option value="on">Увімк</option><option value="off">Вимк</option></select>
        </div>
        <div class="schedule-row">
          <input type="time" id="sched3Start"><input type="time" id="sched3End">
          <select id="sched3State"><option value="on">Увімк</option><option value="off">Вимк</option></select>
        </div>
      </div>
      <button class="schedule-save" id="scheduleSave">Зберегти розклад</button>
    </div>

    <div class="updated" id="updatedAt"></div>
    <button id="logout">Вийти</button>
  </div>
</div>

<script src="mqtt.min.js"></script>
<script src="app.js"></script>
</body>
</html>
